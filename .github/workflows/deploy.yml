name: Full Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Frontend
        run: |
          cd client-side
          npm install
          npm run build

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: 18.191.12.240
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |

            cd /var/www/yumify/server-side
            git pull origin main
            npm install
            pm2 restart yumify-server

      - name: Copy Build Files
        uses: appleboy/scp-action@master
        with:
          host: 18.191.12.240
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "client-side/dist/*"
          target: "/var/www/yumify/client-side/dist/"
          strip_components: 1
