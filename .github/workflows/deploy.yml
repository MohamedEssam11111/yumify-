name: Full Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. بناء الفرونت اند في الـ Runner
      - name: Build Frontend
        run: |
          cd client-side
          npm install
          npm run build

      # 2. تنظيف مجلد الـ dist على السيرفر قبل النسخ (مهم جداً!)
      - name: Prepare Server Directory
        uses: appleboy/ssh-action@master
        with:
          host: 18.191.12.240
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rm -rf /var/www/yumify/client-side/dist/*

      # 3. نسخ ملفات الـ dist الجديدة
      - name: Copy Build Files
        uses: appleboy/scp-action@master
        with:
          host: 18.191.12.240
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "client-side/dist/*"
          target: "/var/www/yumify/client-side/"
          strip_components: 1

      # 4. تحديث السيرفر (Backend)
      - name: Deploy Backend
        uses: appleboy/ssh-action@master
        with:
          host: 18.191.12.240
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/yumify/server-side
            git pull origin main
            npm install
            pm2 restart yumify-server
